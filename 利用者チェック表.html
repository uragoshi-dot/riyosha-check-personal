<script>
function toReiwa(y, m) {
  const rYear = y - 2018;
  return `R${rYear}.${String(m).padStart(2, '0')}`;
}

function reiwaLabel(y, m) {
  return 'R' + (y - 2018) + '年' + m + '月';
}

const now = new Date();
let curYear = now.getFullYear();
let curMonth = now.getMonth() + 1;

function monthKey(y, m) { return `${y}-${String(m).padStart(2, '0')}`; }

const DEFAULT_CLIENTS = [];

function makeRowId(base) {
  if (base.rowId) return String(base.rowId);
  const baseName = String(base.baseName || '').trim();
  const name = String(base.name || '').trim();
  if (baseName) return `base:${baseName}`;
  if (name) return `name:${name}`;
  return `custom:${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
}

function newClientData(base) {
  const visitState = parseVisitState(base);
  return {
    rowId: makeRowId(base),
    name: base.name || '',
    baseName: base.baseName !== undefined ? base.baseName : (base.name || ''),
    customAdded: Boolean(base.customAdded),
    noNumber: Boolean(base.noNumber),
    deleted: Boolean(base.deleted),
    manualOrder: Number.isFinite(base.manualOrder) ? base.manualOrder : null,
    kana: base.kana || '',
    facility: base.facility || '',
    kosin: base.kosin || '',
    yuko: base.yuko || '',
    level: base.level || '',
    planL: base.planL || '',
    planS: base.planS || '',
    seho: base.seho || '',
    sehoCw: base.sehoCw || '',
    kaigoken: base.kaigoken || '',
    biko: base.biko || '',
    visit: '',
    visitDate: visitState.visitDate,
    visitTag1: visitState.visitTag1,
    visitTag2: visitState.visitTag2,
    meetingDate: base.meetingDate || '',
    meetingTag1: base.meetingTag1 || '',
    meetingTag2: base.meetingTag2 || '',
    monita: base.monita || 0,
    sikien: base.sikien || 0,
    drive: base.drive || 0,
    hand: base.hand || 0,
    fax: base.fax || 0,
    plan: base.plan || 0,
    meeting: base.meeting || 0,
    shokai: base.shokai || 0,
    assess: base.assess || 0,
    customFields: normalizeCustomFieldValues(base.customFields)
  };
}

function normalizeCustomFieldValues(value) {
  if (!value || typeof value !== 'object' || Array.isArray(value)) return {};
  return Object.fromEntries(Object.entries(value).map(([key, fieldValue]) => [key, fieldValue ?? '']));
}

function parseVisitState(base) {
  const raw = String(base.visit || '').trim();
  return {
    visitDate: base.visitDate || (/^\d{1,2}日$/.test(raw) ? raw : ''),
    visitTag1: base.visitTag1 || (Boolean(base.visitTel) || raw === 'TEL' || raw === 'TEL' ? 'TEL' : Boolean(base.visitNyuin) || raw === '入院中' ? '入院中' : ''),
    visitTag2: base.visitTag2 || ''
  };
}

function normalizeSehoFields(item) {
  if (item.sehoCw && !item.seho) item.seho = '○';
  return item;
}

function hasVisitValue(item) {
  return Boolean(item.visitDate || item.visitTag1 || item.visitTag2);
}

function hasMeetingValue(item) {
  return Boolean(item.meetingDate || item.meetingTag1 || item.meetingTag2);
}

function removeUnusedTaskHeaders() {
  const headerRow = document.querySelector('thead tr');
  if (!headerRow || headerRow.dataset.removedPlanShokai === '1') return;
  const cells = headerRow.querySelectorAll('th');
  [16, 15, 13].forEach(index => {
    if (cells[index]) cells[index].remove();
  });
  headerRow.dataset.removedPlanShokai = '1';

function loadAll() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function loadCustomColumns() {
  try {
    const parsed = JSON.parse(localStorage.getItem(CUSTOM_COLUMNS_KEY) || '[]');
    if (!Array.isArray(parsed)) return [];
    return parsed
      .map(item => ({
        key: String(item.key || '').trim(),
        label: String(item.label || '').trim(),
        type: item.type === 'date' ? 'date' : 'check'
      }))
      .filter(item => item.key && item.label);
  } catch {
    return [];
  }
}

function saveCustomColumns() {
  localStorage.setItem(CUSTOM_COLUMNS_KEY, JSON.stringify(customColumns));
}

function getAllMovableColumnKeys() {
  return [...BASE_MOVABLE_COLUMN_KEYS, ...customColumns.map(item => item.key)];
}

function getCustomColumn(key) {
  return customColumns.find(item => item.key === key) || null;
}

function isCustomColumnKey(key) {
  return Boolean(getCustomColumn(key));
}

function isCustomCheckColumn(key) {
  return getCustomColumn(key)?.type === 'check';
}

function isCustomDateColumn(key) {
  return getCustomColumn(key)?.type === 'date';
}

function makeCustomColumnKey() {
  return `customcol_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
}

function getFieldValue(item, field) {
  if (isCustomColumnKey(field)) return item.customFields?.[field] || '';
  return item[field];
}

function setFieldValue(item, field, value) {
  if (isCustomColumnKey(field)) {
    item.customFields = normalizeCustomFieldValues(item.customFields);
    item.customFields[field] = value;
    return;
  }
  item[field] = value;
}

function loadColumnOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem(COLUMN_ORDER_KEY) || '[]');
    const movableKeys = getAllMovableColumnKeys();
    if (!Array.isArray(saved)) return [...movableKeys];
    const valid = saved.filter(key => movableKeys.includes(key));
    const missing = movableKeys.filter(key => !valid.includes(key));
    return [...valid, ...missing];
  } catch {
    return [...getAllMovableColumnKeys()];
  }
}

function sortClientsByName(data) {
  return [...data].sort((a, b) => {
    if (orderMode === 'custom') {
      const aOrder = Number.isFinite(a.manualOrder) ? a.manualOrder : Number.MAX_SAFE_INTEGER;
      const bOrder = Number.isFinite(b.manualOrder) ? b.manualOrder : Number.MAX_SAFE_INTEGER;
      if (aOrder !== bOrder) return aOrder - bOrder;
    }
    if (a.noNumber !== b.noNumber) return a.noNumber ? 1 : -1;
    const aName = String(a.name || '').trim();
    const bName = String(b.name || '').trim();
    const aYomi = String(a.kana || '').trim() || NAME_YOMI[aName] || aName;
    const bYomi = String(b.kana || '').trim() || NAME_YOMI[bName] || bName;
    return nameCollator.compare(aYomi, bYomi) || nameCollator.compare(aName, bName);
  });
}

function mergeClientRecord(base, extra) {
  const merged = { ...base };
  Object.keys(extra).forEach(key => {
    const value = extra[key];
    if (value === undefined || value === null || value === '') return;
    if (typeof value === 'number' && value === 0 && merged[key]) return;
    merged[key] = value;
  });
  return normalizeSehoFields(merged);
}

function resolveKanaForName(name) {
  const trimmed = String(name || '').trim();
  if (!trimmed) return '';
  if (NAME_YOMI[trimmed]) return String(NAME_YOMI[trimmed]);
  const normalized = trimmed.replace(/\s+/g, '');
  const fromCurrent = currentData.find(item => {
    const itemName = String(item.name || '').trim();
    const itemBaseName = String(item.baseName || '').trim();
    return itemName === trimmed || itemBaseName === trimmed || itemName.replace(/\s+/g, '') === normalized || itemBaseName.replace(/\s+/g, '') === normalized;
  });
  if (fromCurrent && String(fromCurrent.kana || '').trim()) return String(fromCurrent.kana).trim();
  const fromDefaults = DEFAULT_CLIENTS.find(item => {
    const itemName = String(item.name || '').trim();
    const itemBaseName = String(item.baseName || '').trim();
    return itemName === trimmed || itemBaseName === trimmed || itemName.replace(/\s+/g, '') === normalized || itemBaseName.replace(/\s+/g, '') === normalized;
  });
  if (fromDefaults && String(fromDefaults.kana || '').trim()) return String(fromDefaults.kana).trim();
  return '';
}

function wireKanaAutoTransfer(nameInputId, kanaInputId) {
  const nameInput = document.getElementById(nameInputId);
  const kanaInput = document.getElementById(kanaInputId);
  if (!nameInput || !kanaInput || nameInput.dataset.kanaWired === '1') return;

  let kanaTouched = false;
  const toKanaCandidate = value => {
    const text = String(value || '').trim();
    if (!text) return '';
    return /^[ぁ-んァ-ヶー\s　]+$/.test(text) ? text : '';
  };
  const updateKana = value => {
    if (kanaTouched) return;
    const text = toKanaCandidate(value);
    if (!text) return;
    kanaInput.value = text;
  };

  kanaInput.addEventListener('input', () => {
    kanaTouched = true;
  });

  nameInput.addEventListener('compositionupdate', event => {
    updateKana(event.data || '');
  });

  nameInput.addEventListener('compositionend', event => {
    const knownKana = resolveKanaForName(nameInput.value);
    if (knownKana) {
      updateKana(knownKana);
      return;
    }
    updateKana(toKanaCandidate(event.data || ''));
  });

  nameInput.addEventListener('input', () => {
    const knownKana = resolveKanaForName(nameInput.value);
    if (knownKana) {
      updateKana(knownKana);
      return;
    }
    updateKana(toKanaCandidate(nameInput.value));
  });

  nameInput.dataset.kanaWired = '1';
}

function dedupeClients(data) {
  const byName = new Map();
  data.forEach(item => {
    const name = String(item.name || '').trim();
    const rowId = makeRowId(item);
    const baseName = String(item.baseName || '').trim();
    const key = rowId || baseName || name;
    if (!key) return;
    if (!byName.has(key)) {
      byName.set(key, normalizeSehoFields({ ...item, rowId, name, baseName }));
      return;
    }
    byName.set(key, mergeClientRecord(byName.get(key), { ...item, rowId, name, baseName }));
  });
  return Array.from(byName.values());
}

function syncClientList(data) {
  const normalized = dedupeClients(data);
  const byBaseName = new Map(normalized.map(item => [String(item.baseName || '').trim(), item]).filter(([key]) => key));
  const byName = new Map(normalized.map(item => [item.name, item]));
  const merged = [];
  DEFAULT_CLIENTS.forEach(base => {
    const existing = byBaseName.get(base.name) || byName.get(base.name);
    if (!existing) {
      merged.push(newClientData(base));
      return;
    }
    if (existing.deleted) {
      merged.push({
        ...newClientData(base),
        ...existing,
        baseName: existing.baseName || base.name,
        deleted: true
      });
      return;
    }
    const existingVisit = parseVisitState(existing);
    merged.push({
      ...newClientData(base),
      ...existing,
      baseName: existing.baseName || base.name,
      customAdded: false,
      deleted: false,
      manualOrder: Number.isFinite(existing.manualOrder) ? existing.manualOrder : null,
      kana: existing.kana !== undefined ? existing.kana : (base.kana || ''),
      kosin: existing.kosin !== undefined ? existing.kosin : (base.kosin || ''),
      yuko: existing.yuko !== undefined ? existing.yuko : (base.yuko || ''),
      level: existing.level !== undefined ? existing.level : (base.level || ''),
      planL: existing.planL !== undefined ? existing.planL : (base.planL || ''),
      planS: existing.planS !== undefined ? existing.planS : (base.planS || ''),
      visitDate: existingVisit.visitDate,
      visitTag1: existingVisit.visitTag1,
      visitTag2: existingVisit.visitTag2,
      meetingDate: existing.meetingDate !== undefined ? existing.meetingDate : (base.meetingDate || ''),
      meetingTag1: existing.meetingTag1 !== undefined ? existing.meetingTag1 : (base.meetingTag1 || ''),
      meetingTag2: existing.meetingTag2 !== undefined ? existing.meetingTag2 : (base.meetingTag2 || ''),
      seho: existing.seho !== undefined ? existing.seho : (base.seho || ''),
      sehoCw: existing.sehoCw !== undefined ? existing.sehoCw : (base.sehoCw || ''),
      kaigoken: existing.kaigoken !== undefined ? existing.kaigoken : (base.kaigoken || ''),
      biko: existing.biko !== undefined ? existing.biko : (base.biko || ''),
      customFields: normalizeCustomFieldValues(existing.customFields)
    });
  });
  normalized.forEach(item => {
    const isDefaultLinked = DEFAULT_CLIENTS.some(base => base.name === item.baseName || base.name === item.name);
    if (!isDefaultLinked && item.customAdded && !item.deleted) merged.push(item);
  });
  return dedupeClients(merged);
}

function getMonthData(y, m) {
  const all = loadAll();
  const key = monthKey(y, m);
  if (all[key]) {
    all[key] = sortClientsByName(syncClientList(all[key]));
    saveAll(all);
    return all[key];
  }

  let pm = m - 1;
  let py = y;
  if (pm < 1) {
    pm = 12;
    py -= 1;
  }
  const prevKey = monthKey(py, pm);

  if (all[prevKey] && all[prevKey].length > 0) {
    all[key] = all[prevKey].map(c => ({
      ...c,
      kosin: '',
      visit: '',
      visitDate: '',
      visitTag1: '',
      visitTag2: '',
      meetingDate: '',
      meetingTag1: '',
      meetingTag2: '',
      monita: 0,
      sikien: 0,
      drive: 0,
      hand: 0,
      fax: 0,
      plan: 0,
      meeting: 0,
      shokai: 0,
      assess: 0
    }));
  } else {
    all[key] = DEFAULT_CLIENTS.map(newClientData);
  }

  all[key] = sortClientsByName(syncClientList(all[key]));

  saveAll(all);
  return all[key];
}

function saveMonthData(y, m, data) {
  const all = loadAll();
  all[monthKey(y, m)] = sortClientsByName(dedupeClients(data));
  saveAll(all);
}

async function exportLocalData() {
  const payload = buildExportPayload();
  const text = JSON.stringify(payload, null, 2);
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  const filename = `利用者チェック表_個人データ_${stamp}.json`;

  if (typeof window.showSaveFilePicker === 'function') {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        startIn: 'desktop',
        types: [{
          description: 'JSON files',
          accept: { 'application/json': ['.json'] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(text);
      await writable.close();
      return;
    } catch (error) {
      if (error && error.name === 'AbortError') return;
    }
  }

  const url = URL.createObjectURL(blob);
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function shortDate(value) {
  if (!value) return '';
  const parsed = parseAnyDate(value);
  if (!parsed) return String(value).replace(/\./g, '/');
  if (allDateReiwa) return formatWareki(parsed.year, parsed.month, parsed.day);
  const year = String(parsed.year);
  const month = String(parsed.month).padStart(2, '0');
  const day = String(parsed.day).padStart(2, '0');
  return `${year}/${month}/${day}`;
}

function getYukoStatus(value) {
  const parsed = parseAnyDate(value);
  if (!parsed) return '';
  const today = new Date();
  const currentMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const redStart = new Date(parsed.year, parsed.month - 3, 1);
  const grayStart = new Date(parsed.year, parsed.month - 2, 1);
  const nextCertStart = new Date(parsed.year, parsed.month, 1);
  if (currentMonthStart >= nextCertStart) return 'blank';
  if (currentMonthStart >= grayStart) return 'done';
  if (currentMonthStart >= redStart) return 'soon';
  return '';
}

function isExpiringSoon(value) {
  return getYukoStatus(value) === 'soon';
}

function isExpiringProcedureDone(value) {
  return getYukoStatus(value) === 'done';
}

function isNewCertificationStarted(value) {
  return getYukoStatus(value) === 'blank';
}

function isCurrentShortPlan(value) {
  if (!value) return false;
  const match = value.match(/R(\d+)\.(\d+)\.(\d+)/);
  if (!match) return false;
  const y = parseInt(match[1], 10) + 2018;
  const m = parseInt(match[2], 10);
  const start = new Date(y, m - 1, 1);
  return new Date() >= start;
}

function isCurrentLongPlan(value) {
  if (!value) return false;
  const match = value.match(/R(\d+)\.(\d+)\.(\d+)/);
  if (!match) return false;
  const y = parseInt(match[1], 10) + 2018;
  const m = parseInt(match[2], 10);
  const start = new Date(y, m - 1, 1);
  return new Date() >= start;
}

function parseWareki(value) {
  if (!value) return null;
  const match = String(value).trim().match(/^R(\d+)\.(\d+)\.(\d+)$/);
  if (!match) return null;
  return {
    year: parseInt(match[1], 10) + 2018,
    month: parseInt(match[2], 10),
    day: parseInt(match[3], 10)
  };
}

function formatWareki(year, month, day) {
  return `R${year - 2018}.${month}.${day}`;
}

function parseAnyDate(value) {
  if (!value) return null;
  const wareki = parseWareki(value);
  if (wareki) return wareki;
  const match = String(value).trim().match(/^(\d{4})[\/.](\d{1,2})[\/.](\d{1,2})$/);
  if (!match) return null;
  return {
    year: parseInt(match[1], 10),
    month: parseInt(match[2], 10),
    day: parseInt(match[3], 10)
  };
}

function changeVisitMonth(dir) {
  visitPickerMonth += dir;
  if (visitPickerMonth > 12) {
    visitPickerMonth = 1;
    visitPickerYear += 1;
  }
  if (visitPickerMonth < 1) {
    visitPickerMonth = 12;
    visitPickerYear -= 1;
  }
  if (addClientDraft && datePickerField && modalIndex < 0) {
    renderAddClientCalendar();
    return;
  }
  renderVisitCalendar();
}

function jumpVisitCalendar() {
  const year = document.getElementById('visit-calendar-year');
  const month = document.getElementById('visit-calendar-month');
  if (!year || !month) return;
  visitPickerYear = parseInt(year.value, 10);
  visitPickerMonth = parseInt(month.value, 10);
  if (addClientDraft && datePickerField && modalIndex < 0) {
    renderAddClientCalendar();
    return;
  }
  renderVisitCalendar();
}

function renderVisitCalendar() {
  const yearSelect = document.getElementById('visit-calendar-year');
  const monthSelect = document.getElementById('visit-calendar-month');
  const grid = document.getElementById('visit-calendar-grid');
  if (!yearSelect || !monthSelect || !grid) return;
  renderCalendarSelects(yearSelect, monthSelect, visitPickerYear, visitPickerMonth);
  grid.innerHTML = '';

  const selectedRaw = String(getFieldValue(currentData[modalIndex], datePickerField) || '');
  let selectedDay = null;
  if (datePickerField === 'visitDate' || datePickerField === 'meetingDate') {
    const match = selectedRaw.match(/^(\d{1,2})日$/);
    selectedDay = match ? parseInt(match[1], 10) : null;
  } else {
    const parsed = parseAnyDate(selectedRaw);
    selectedDay = parsed && parsed.year === visitPickerYear && parsed.month === visitPickerMonth ? parsed.day : null;
  }
  const firstWeekday = new Date(visitPickerYear, visitPickerMonth - 1, 1).getDay();
  const daysInMonth = new Date(visitPickerYear, visitPickerMonth, 0).getDate();

  for (let i = 0; i < firstWeekday; i += 1) {
    const blank = document.createElement('button');
    blank.className = 'calendar-day blank';
    blank.disabled = true;
    blank.textContent = '';
    grid.appendChild(blank);
  }

  for (let day = 1; day <= daysInMonth; day += 1) {
    const btn = document.createElement('button');
    btn.className = `calendar-day${selectedDay === day ? ' sel' : ''}`;
    btn.textContent = String(day);
    btn.onclick = () => {
      if (datePickerField === 'visitDate') {
        if (selectedDay === day) {
          currentData[modalIndex].visitDate = '';
          currentData[modalIndex].visit = '';
          saveMonthData(curYear, curMonth, currentData);
          render();
          openVisit(modalIndex);
          return;
        }
        setVisitDate(`${day}日`);
        return;
      }
      if (datePickerField === 'meetingDate') {
        if (selectedDay === day) {
          currentData[modalIndex].meetingDate = '';
          saveMonthData(curYear, curMonth, currentData);
          render();
          openMeeting(modalIndex);
          return;
        }
        currentData[modalIndex].meetingDate = `${day}日`;
        saveMonthData(curYear, curMonth, currentData);
        render();
        openMeeting(modalIndex);
        return;
      }
      if (selectedDay === day) {
        setFieldValue(currentData[modalIndex], datePickerField, '');
        saveMonthData(curYear, curMonth, currentData);
        openPeriodDatePicker(modalIndex, datePickerField, getPeriodFieldLabel(datePickerField));
        return;
      }
      setFieldValue(currentData[modalIndex], datePickerField, formatWareki(visitPickerYear, visitPickerMonth, day));
      saveMonthData(curYear, curMonth, currentData);
      openPeriodDatePicker(modalIndex, datePickerField, getPeriodFieldLabel(datePickerField));
    };
    grid.appendChild(btn);
  }
}

function renderCalendarSelects(yearSelect, monthSelect, year, month) {
  const startYear = Math.max(2019, curYear - 8);
  const endYear = curYear + 12;
  yearSelect.innerHTML = '';
  for (let y = startYear; y <= endYear; y += 1) {
    const option = document.createElement('option');
    option.value = String(y);
    option.textContent = String(y) + '年（R' + String(y - 2018) + '）';
    option.selected = y === year;
    yearSelect.appendChild(option);
  }
  monthSelect.innerHTML = '';
  for (let m = 1; m <= 12; m += 1) {
    const option = document.createElement('option');
    option.value = String(m);
    option.textContent = String(m) + '月';
    option.selected = m === month;
    monthSelect.appendChild(option);
  }
}

function bindRowSelection(cell, i) {
  const toggleRowSelection = event => {
    if (event) event.stopPropagation();
    const row = cell.parentElement;
    if (!row) return;
    const rowId = row.dataset.rowId || '';
    const willSelect = selectedRowId !== rowId;
    selectedRowId = willSelect ? rowId : '';
    applySelectedRowState();
  };
  cell.addEventListener('dblclick', toggleRowSelection);
  cell.addEventListener('pointerup', event => {
    if (event.pointerType !== 'touch' && event.pointerType !== 'pen') return;
    const now = Date.now();
    const lastTap = Number(cell.dataset.lastTapAt || '0');
    cell.dataset.lastTapAt = String(now);
    if (now - lastTap > 320) return;
    event.preventDefault();
    toggleRowSelection(event);
  });
}

function bindRowTapSelection(row) {

function startRowHold(event, row) {
  clearTimeout(rowDragHoldTimer);
  rowDragPointerId = event.pointerId;
  rowDragRowEl = row;
  rowDragRowId = row.dataset.rowId || '';
  rowDragTargetRowId = '';
  rowDragTargetAfter = false;
  rowDragStartY = event.clientY;
  const rect = row.getBoundingClientRect();
  rowDragPointerOffsetY = event.clientY - rect.top;
  rowDragHoldTimer = setTimeout(() => {
    if (orderMode !== 'custom') saveOrderMode('custom');
    rowDragActive = true;
    if (rowDragRowEl) rowDragRowEl.classList.add('row-dragging');
    document.querySelector('.tbl-wrap')?.classList.add('row-drag-lock');
  }, 140);
}

function clearRowDropMarkers() {
  document.querySelectorAll('#tbody tr.row-drop-target').forEach(tr => {
    tr.classList.remove('row-drop-target', 'drop-before', 'drop-after');
  });
}

function updateRowDropMarker(targetRowId, insertAfter) {
  clearRowDropMarkers();
  if (!targetRowId || targetRowId === rowDragRowId) return;
  const row = document.querySelector(`#tbody tr[data-row-id="${CSS.escape(targetRowId)}"]`);
  if (!row) return;
  row.classList.add('row-drop-target', insertAfter ? 'drop-after' : 'drop-before');
}

function moveHeldRow(event) {
  if (rowDragPointerId !== event.pointerId || !rowDragRowEl) return;
  if (!rowDragActive) return;
  event.preventDefault();
  const rect = rowDragRowEl.getBoundingClientRect();
  const deltaY = event.clientY - rect.top - rowDragPointerOffsetY;
  rowDragRowEl.style.transform = `translateY(${Math.round(deltaY)}px) scale(1.01)`;
  const rows = Array.from(document.querySelectorAll('#tbody tr')).filter(tr => tr.dataset.rowId && tr.dataset.rowId !== rowDragRowId);
  let nextTargetId = '';
  let nextAfter = false;
  for (const row of rows) {
    const rowRect = row.getBoundingClientRect();
    const rowCenter = rowRect.top + (rowRect.height / 2);
    if (event.clientY < rowCenter) {
      nextTargetId = row.dataset.rowId || '';
      nextAfter = false;
      break;
    }
    nextTargetId = row.dataset.rowId || '';
    nextAfter = true;
  }
  rowDragTargetRowId = nextTargetId;
  rowDragTargetAfter = nextAfter;
  updateRowDropMarker(nextTargetId, nextAfter);
}

function commitRowReorder() {
  if (!rowDragRowId || !rowDragTargetRowId || rowDragRowId === rowDragTargetRowId) return false;
  const sourceIndex = currentData.findIndex(item => item.rowId === rowDragRowId);
  const targetIndex = currentData.findIndex(item => item.rowId === rowDragTargetRowId);
  if (sourceIndex < 0 || targetIndex < 0) return false;
  const nextData = [...currentData];
  const [moved] = nextData.splice(sourceIndex, 1);
  let insertIndex = nextData.findIndex(item => item.rowId === rowDragTargetRowId);
  if (insertIndex < 0) return false;
  if (rowDragTargetAfter) insertIndex += 1;
  nextData.splice(insertIndex, 0, moved);
  nextData.forEach((item, index) => {
    item.manualOrder = item.noNumber ? Number.MAX_SAFE_INTEGER + index : index;
  });
  currentData = nextData;
  saveMonthData(curYear, curMonth, currentData);
  return true;
}

function endRowHold(event) {
  if (event && rowDragPointerId !== null && event.pointerId !== rowDragPointerId) return;
  clearTimeout(rowDragHoldTimer);
  const shouldCommit = rowDragActive;
  document.querySelector('.tbl-wrap')?.classList.remove('row-drag-lock');
  if (rowDragRowEl) {
    rowDragRowEl.classList.remove('row-dragging');
    rowDragRowEl.style.transform = '';
  }
  clearRowDropMarkers();
  if (shouldCommit) {
    commitRowReorder();
    rowDragActive = false;
    rowDragPointerId = null;
    rowDragRowEl = null;
    rowDragRowId = '';
    rowDragTargetRowId = '';
    rowDragTargetAfter = false;
    render();
    return;
  }
  rowDragActive = false;
  rowDragPointerId = null;
  rowDragRowEl = null;
  rowDragRowId = '';
  rowDragTargetRowId = '';
  rowDragTargetAfter = false;
}

}

function tapRowReorder(rowId) {
  if (rowEditorDeleteMode) {
    const index = currentData.findIndex(item => item.rowId === rowId);
    if (index >= 0) confirmDelete(index);

  }
  if (!rowEditorReorderMode) return;
  if (!selectedRowReorderId) {
    selectedRowReorderId = rowId;
    renderRowReorderModal();

  if (selectedRowReorderId === rowId) {
    selectedRowReorderId = '';
    renderRowReorderModal();

  const rows = getVisibleRowItems();
  const movingIndex = rows.findIndex(item => item.rowId === selectedRowReorderId);
  const targetIndex = rows.findIndex(item => item.rowId === rowId);
  if (movingIndex < 0 || targetIndex < 0) return;
  const nextRows = [...rows];
  const [moving] = nextRows.splice(movingIndex, 1);
  const insertIndex = nextRows.findIndex(item => item.rowId === rowId);
  if (insertIndex < 0) return;
  nextRows.splice(insertIndex, 0, moving);
  updateManualOrderFromVisibleRows(nextRows);
  saveMonthData(curYear, curMonth, currentData);
  selectedRowReorderId = '';
  renderRowReorderModal();
  render();
}

function renderColumnHeaderOrder() {
  const headerRow = document.querySelector('thead tr');
  if (!headerRow) return;
  Array.from(headerRow.querySelectorAll('th[data-custom-col="1"]')).forEach(th => th.remove());
  const fixedStart = Array.from(headerRow.querySelectorAll('th')).slice(0, 3);
  const fixedEnd = headerRow.querySelector('th.h-biko');
  customColumns.forEach(item => {
    const th = document.createElement('th');
    th.className = `h-rot${item.type === 'date' ? ' h-rot-date' : ''} col-movable`;
    th.dataset.colKey = item.key;
    th.dataset.customCol = '1';
    th.innerHTML = `<span class="inner">${esc(item.label)}</span>`;
    headerRow.insertBefore(th, fixedEnd);
  });
  const movableMap = new Map(
    Array.from(headerRow.querySelectorAll('th[data-col-key]')).map(th => [th.dataset.colKey, th])
  );
  columnOrder.forEach(key => {
    const th = movableMap.get(key);
    if (th) headerRow.insertBefore(th, fixedEnd);
  });
  fixedStart.forEach((th, index) => {
    const anchor = headerRow.children[index];
    if (anchor !== th) headerRow.insertBefore(th, anchor || headerRow.firstChild);
  });
  Array.from(headerRow.querySelectorAll('th[data-col-key]')).forEach(th => {
    th.classList.toggle('col-selected', th.dataset.colKey === selectedColumnKey);
  });
  bindMovableColumnHeaders();
}

function moveColumnKeyInOrder(sourceKey, targetKey, insertAfter) {
  if (!sourceKey || !targetKey || sourceKey === targetKey) return false;
  const nextOrder = columnOrder.filter(key => key !== sourceKey);
  const baseIndex = nextOrder.indexOf(targetKey);
  if (baseIndex < 0) return false;
  const insertIndex = insertAfter ? baseIndex + 1 : baseIndex;
  nextOrder.splice(insertIndex, 0, sourceKey);
  if (nextOrder.join('|') === columnOrder.join('|')) return false;
  columnOrder = nextOrder;
  return true;
}

function reorderColumnDom(sourceKey, targetKey, insertAfter) {
  if (!moveColumnKeyInOrder(sourceKey, targetKey, insertAfter)) return false;
  const headerRow = document.querySelector('thead tr');
  const bodyRows = Array.from(document.querySelectorAll('#tbody tr'));
  const headerSource = headerRow?.querySelector(`th[data-col-key="${sourceKey}"]`);
  const headerTarget = headerRow?.querySelector(`th[data-col-key="${targetKey}"]`);
  if (headerRow && headerSource && headerTarget) {
    headerRow.insertBefore(headerSource, insertAfter ? headerTarget.nextSibling : headerTarget);
  }
  bodyRows.forEach(row => {
    const sourceCell = row.querySelector(`td[data-col-key="${sourceKey}"]`);
    const targetCell = row.querySelector(`td[data-col-key="${targetKey}"]`);
    if (!sourceCell || !targetCell) return;
    row.insertBefore(sourceCell, insertAfter ? targetCell.nextSibling : targetCell);
  });
  renderColumnHeaderOrder();
  return true;
}

function bindMovableColumnHeaders() {
  document.querySelectorAll('th[data-col-key]').forEach(th => {
    if (th.dataset.bound === '1') return;
    th.dataset.bound = '1';
    th.addEventListener('dblclick', event => {
      event.stopPropagation();
      const key = th.dataset.colKey || '';
      selectedColumnKey = selectedColumnKey === key ? '' : key;
      renderColumnHeaderOrder();
    });
  });
}

function startColumnHold(event, key, th) {
  clearTimeout(columnDragHoldTimer);
  columnDragPointerId = event.pointerId;
  columnDragKey = key;
  columnDragHeaderEl = th;
  columnDragTargetKey = '';
  columnDragTargetAfter = false;
  columnDragStartX = event.clientX;
  const rect = th.getBoundingClientRect();
  columnDragPointerOffsetX = event.clientX - rect.left;
  const activateDrag = () => {
    columnDragActive = true;
    if (columnDragHeaderEl) columnDragHeaderEl.classList.add('col-dragging');
  };
  columnDragHoldTimer = setTimeout(activateDrag, 260);
}

function updateColumnDropMarker(targetKey, insertAfter) {
  document.querySelectorAll('th[data-col-key]').forEach(th => th.classList.remove('col-drop-target'));
  const markerKey = insertAfter
    ? columnOrder[columnOrder.indexOf(targetKey) + 1] || ''
    : targetKey;
  if (!markerKey || markerKey === columnDragKey) return;
  document.querySelector(`th[data-col-key="${markerKey}"]`)?.classList.add('col-drop-target');
}

function previewMoveSelectedColumn(targetKey, insertAfter) {
  if (!reorderColumnDom(columnDragKey, targetKey, insertAfter)) return;
  const activeHeader = document.querySelector(`th[data-col-key="${columnDragKey}"]`);
  if (activeHeader) {
    activeHeader.classList.add('col-dragging');
    activeHeader.style.transform = `translateX(${Math.round((columnDragTargetAfter ? 8 : -8) + 0)}px) scale(1.04)`;
    columnDragHeaderEl = activeHeader;
  }
}

function moveHeldColumn(event) {
  if (!columnDragActive || columnDragPointerId !== event.pointerId || !columnDragKey) return;
  event.preventDefault();
  let dragCenterX = event.clientX;
  if (columnDragHeaderEl) {
    const rect = columnDragHeaderEl.getBoundingClientRect();
    const deltaX = event.clientX - rect.left - columnDragPointerOffsetX;
    columnDragHeaderEl.style.transform = `translateX(${Math.round(deltaX)}px) scale(1.04)`;
    dragCenterX = rect.left + columnDragPointerOffsetX + deltaX;
  }

  const orderedHeaders = columnOrder
    .map(key => document.querySelector(`th[data-col-key="${key}"]`))
    .filter(Boolean);
  const dragIndex = columnOrder.indexOf(columnDragKey);
  if (dragIndex < 0) {
    document.querySelectorAll('th[data-col-key]').forEach(th => th.classList.remove('col-drop-target'));
    return;
  }

  const prevKey = columnOrder[dragIndex - 1] || '';
  const nextKey = columnOrder[dragIndex + 1] || '';
  const prevHeader = prevKey ? document.querySelector(`th[data-col-key="${prevKey}"]`) : null;
  const nextHeader = nextKey ? document.querySelector(`th[data-col-key="${nextKey}"]`) : null;

  if (prevHeader) {
    const prevRect = prevHeader.getBoundingClientRect();
    const prevCenter = prevRect.left + (prevRect.width / 2);
    if (dragCenterX < prevCenter) {
      updateColumnDropMarker(prevKey, false);
      if (columnDragTargetKey !== prevKey || columnDragTargetAfter !== false) {
        columnDragTargetKey = prevKey;
        columnDragTargetAfter = false;
        previewMoveSelectedColumn(prevKey, false);
      }
      return;
    }
  }

  if (nextHeader) {
    const nextRect = nextHeader.getBoundingClientRect();
    const nextCenter = nextRect.left + (nextRect.width / 2);
    if (dragCenterX > nextCenter) {
      updateColumnDropMarker(nextKey, true);
      if (columnDragTargetKey !== nextKey || columnDragTargetAfter !== true) {
        columnDragTargetKey = nextKey;
        columnDragTargetAfter = true;
        previewMoveSelectedColumn(nextKey, true);
      }
      return;
    }
  }

  if (!orderedHeaders.length) {
    document.querySelectorAll('th[data-col-key]').forEach(th => th.classList.remove('col-drop-target'));
    return;
  }

  document.querySelectorAll('th[data-col-key]').forEach(th => th.classList.remove('col-drop-target'));
  columnDragTargetKey = '';
  columnDragTargetAfter = false;
}

function endColumnHold(event) {
  clearTimeout(columnDragHoldTimer);
  if (event && columnDragPointerId !== null && columnDragPointerId !== event.pointerId) return;
  if (columnDragActive) {
    saveColumnOrder();
    render();
  }
  document.querySelectorAll('th[data-col-key]').forEach(th => {
    th.classList.remove('col-dragging', 'col-drop-target');
    th.style.transform = '';
  });
  columnDragPointerId = null;
  columnDragHoldTimer = null;
  columnDragActive = false;
  columnDragKey = '';
  columnDragHeaderEl = null;
  columnDragTargetKey = '';
  columnDragTargetAfter = false;
  columnDragStartX = 0;
  columnDragPointerOffsetX = 0;
}

function render() {
  renderColumnHeaderOrder();
  orderMode = loadOrderMode();
  currentData = sortClientsByName(getMonthData(curYear, curMonth));
  const visibleData = currentData.filter(item => !item.deleted);
  document.getElementById('month-label').textContent = reiwaLabel(curYear, curMonth);
  const warekiBtn = document.getElementById('date-toggle-wareki');
  const seirekiBtn = document.getElementById('date-toggle-seireki');
  if (warekiBtn) warekiBtn.classList.toggle('is-active', allDateReiwa);
  if (seirekiBtn) seirekiBtn.classList.toggle('is-active', !allDateReiwa);
  const orderNameBtn = document.getElementById('order-toggle-name');
  const orderCustomBtn = document.getElementById('order-toggle-custom');
  if (orderNameBtn) orderNameBtn.classList.toggle('is-active', orderMode !== 'custom');
  if (orderCustomBtn) orderCustomBtn.classList.toggle('is-active', orderMode === 'custom');
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  visibleData.forEach((item, displayIndex) => {
    const originalIndex = currentData.indexOf(item);

    const tr = document.createElement('tr');
    tr.dataset.sourceIndex = String(originalIndex);
    tr.dataset.rowId = item.rowId || '';
    if (CHK.every(key => item[key] === 1)) tr.classList.add('done-row');
    if (selectedRowId && selectedRowId === (item.rowId || '')) tr.classList.add('row-selected');
    bindRowTapSelection(tr);

    const tdNo = document.createElement('td');
    tdNo.className = 'td-no';
    tdNo.textContent = item.noNumber ? '' : displayIndex + 1;
    bindRowSelection(tdNo, originalIndex);
    tr.appendChild(tdNo);

    const nameTd = document.createElement('td');
    nameTd.className = 'td-name';
    nameTd.innerHTML = `<div class="name-cell">${item.kana ? `<div class="name-kana">${esc(item.kana)}</div>` : ''}<div class="name-main">${esc(item.name)}</div></div>`;
    nameTd.addEventListener('dblclick', event => {
      event.stopPropagation();
      openNameEditor(originalIndex);
    });
    tr.appendChild(nameTd);

    const kosinTd = document.createElement('td');
    kosinTd.className = 'td-kosin';
    kosinTd.textContent = item.kosin || '';
    kosinTd.addEventListener('dblclick', event => {
      event.stopPropagation();
      openKosin(originalIndex);
    });
    tr.appendChild(kosinTd);

    const yukoStatus = getYukoStatus(item.yuko);
    const columnCells = {};

    const yukoTd = document.createElement('td');
    yukoTd.dataset.colKey = 'yuko';
    const yukoStatusClass = yukoStatus === 'done' ? ' expiring-done' : (yukoStatus === 'soon' ? ' expiring' : '');
    yukoTd.className = `td-date${yukoStatusClass}`;
    yukoTd.textContent = yukoStatus === 'blank' ? '' : shortDate(item.yuko);
    bindDateCell(yukoTd, () => openPeriodDatePicker(originalIndex, 'yuko', getPeriodFieldLabel('yuko')));
    columnCells.yuko = yukoTd;

    const lvTd = document.createElement('td');
    lvTd.dataset.colKey = 'level';
    lvTd.className = 'td-lv is-clickable';
    lvTd.textContent = item.level;
    lvTd.addEventListener('dblclick', event => {
      event.stopPropagation();
      openLevelPicker(originalIndex);
    });
    columnCells.level = lvTd;

    const planLTd = document.createElement('td');
    planLTd.dataset.colKey = 'planL';
    planLTd.className = `td-date${yukoStatus === 'done' ? ' expiring-done' : (isCurrentLongPlan(item.planL) ? ' plan-long-current' : '')}`;
    planLTd.textContent = yukoStatus === 'blank' ? '' : shortDate(item.planL);
    bindDateCell(planLTd, () => openPeriodDatePicker(originalIndex, 'planL', getPeriodFieldLabel('planL')));
    columnCells.planL = planLTd;

    const planSTd = document.createElement('td');
    planSTd.dataset.colKey = 'planS';
    planSTd.className = `td-date${yukoStatus === 'done' ? ' expiring-done' : (isCurrentShortPlan(item.planS) ? ' plan-current' : '')}`;
    planSTd.textContent = yukoStatus === 'blank' ? '' : shortDate(item.planS);
    bindDateCell(planSTd, () => openPeriodDatePicker(originalIndex, 'planS', getPeriodFieldLabel('planS')));
    columnCells.planS = planSTd;

    const visitTd = document.createElement('td');
    visitTd.dataset.colKey = 'visit';
    visitTd.className = `td-visit${hasVisitValue(item) ? '' : ' is-empty'}`;
    const tags = [item.visitTag1, item.visitTag2].filter(Boolean);
    const visitCellClass = tags.length === 0 && item.visitDate ? 'visit-cell date-only' : 'visit-cell';
    visitTd.innerHTML = `
      <div class="${visitCellClass}">
        <div class="visit-date-text" data-visit-edit="date">${esc(item.visitDate || '')}</div>
        <div class="visit-tags" data-visit-edit="tags">${tags.map(tag => `<span class="visit-tag" data-visit-edit="tags">${esc(tag)}</span>`).join('')}</div>
      </div>`;
    visitTd.addEventListener('dblclick', event => {
      event.stopPropagation();
      openVisit(originalIndex);
    });
    visitTd.addEventListener('keydown', event => {
      if (event.key === 'Backspace' || event.key === 'Delete') {
        event.preventDefault();
        clearVisit(originalIndex);
      }
    });
    columnCells.visit = visitTd;

    CHK.forEach(key => {
      const td = document.createElement('td');
      td.dataset.colKey = key;
      td.className = 'td-cc';
      td.innerHTML = `<span class="circle ${item[key] === 1 ? 'on' : 'off'}">${item[key] === 1 ? '✓' : '○'}</span>`;
      td.addEventListener('dblclick', event => {
        event.stopPropagation();
        tog(originalIndex, key);
      });
      columnCells[key] = td;
    });

    const meetingTd = document.createElement('td');
    meetingTd.dataset.colKey = 'meeting';
    meetingTd.className = `td-visit${hasMeetingValue(item) ? '' : ' is-empty'}`;
    const meetingTags = [item.meetingTag1, item.meetingTag2].filter(Boolean);
    const meetingCellClass = meetingTags.length === 0 && item.meetingDate ? 'visit-cell date-only' : 'visit-cell';
    meetingTd.innerHTML = `
      <div class="${meetingCellClass}">
        <div class="visit-date-text">${esc(item.meetingDate || '')}</div>
        <div class="visit-tags">${meetingTags.map(tag => `<span class="visit-tag">${esc(tag)}</span>`).join('')}</div>
      </div>`;
    meetingTd.addEventListener('dblclick', event => {
      event.stopPropagation();
      openMeeting(originalIndex);
    });
    meetingTd.addEventListener('keydown', event => {
      if (event.key === 'Backspace' || event.key === 'Delete') {
        event.preventDefault();
        clearMeeting(originalIndex);
      }
    });
    columnCells.meeting = meetingTd;

    const sehoTd = document.createElement('td');
    sehoTd.dataset.colKey = 'seho';
    sehoTd.className = 'td-seho';
    sehoTd.innerHTML = item.seho || item.sehoCw ? `<div class="seho-cell">${item.seho ? `<span class="seho-dot" title="${esc(item.seho)}"></span>` : '<span style="height:10px"></span>'}${item.sehoCw ? `<span class="seho-label">(${esc(item.sehoCw)})</span>` : ''}</div>` : '';
    sehoTd.addEventListener('dblclick', event => {
      event.stopPropagation();
      openSehoEditor(originalIndex);
    });
    columnCells.seho = sehoTd;

    customColumns.forEach(column => {
      if (column.type === 'check') {
        const td = document.createElement('td');
        const value = Number(getFieldValue(item, column.key)) === 1 ? 1 : 0;
        td.dataset.colKey = column.key;
        td.className = 'td-cc';
        td.innerHTML = `<span class="circle ${value === 1 ? 'on' : 'off'}">${value === 1 ? '✓' : '○'}</span>`;
        td.addEventListener('dblclick', event => {
          event.stopPropagation();
          tog(originalIndex, column.key);
        });
        columnCells[column.key] = td;
        return;
      }
      const td = document.createElement('td');
      td.dataset.colKey = column.key;
      td.className = 'td-date';
      td.textContent = shortDate(getFieldValue(item, column.key) || '');
      bindDateCell(td, () => openPeriodDatePicker(originalIndex, column.key, column.label));
      columnCells[column.key] = td;
    });

    columnOrder.forEach(key => {
      const td = columnCells[key];
      if (td) tr.appendChild(td);
    });

    const bikoTd = document.createElement('td');
    bikoTd.className = 'td-biko';
    bikoTd.textContent = item.biko || '';
    bikoTd.addEventListener('dblclick', event => {
      event.stopPropagation();
      openBiko(originalIndex);
    });
    tr.appendChild(bikoTd);
    tbody.appendChild(tr);
  });

  document.getElementById('s-total').textContent = visibleData.length;
}

document.getElementById('import-data-input')?.addEventListener('change', event => {
  importLocalDataFromFile(event.target.files?.[0]);
});

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

removeUnusedTaskHeaders();
customColumns = loadCustomColumns();
columnOrder = loadColumnOrder();
bindMovableColumnHeaders();
render();
</script>
</body>
</html>
